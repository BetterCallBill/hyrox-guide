      function fmtTime(sec) {
        if (!isFinite(sec) || sec < 0) { sec = 0; }
        var m = Math.floor(sec / 60);
        var s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
      }

      function setupVideos() {
        var blocks = document.querySelectorAll("[data-vidblock]");
        Array.prototype.forEach.call(blocks, function (block) {
          var video = block.querySelector("video");
          var fill = block.querySelector("[data-fill]");
          var track = block.querySelector("[data-progress]");
          var time = block.querySelector("[data-time]");
          var toggle = block.querySelector('[data-vidaction="playpause"]');
          var overlay = block.querySelector("[data-overlay]");
          if (!video) return;

          var hideTimer;
          function showControls() {
            if (overlay) { overlay.style.opacity = "1"; }
            clearTimeout(hideTimer);
            hideTimer = setTimeout(function () { if (overlay) { overlay.style.opacity = "0"; } }, 1000);
          }
          function hideControls() {
            clearTimeout(hideTimer);
            if (overlay) { overlay.style.opacity = "0"; }
          }
          block.addEventListener("mousemove", showControls);
          block.addEventListener("mouseenter", showControls);
          block.addEventListener("touchstart", showControls, { passive: true });
          block.addEventListener("mouseleave", hideControls);
          showControls();

          function sync() {
            var d = video.duration || 0;
            if (fill) { fill.style.width = (d ? (video.currentTime / d * 100) : 0) + "%"; }
            if (time) { time.textContent = fmtTime(video.currentTime) + " / " + fmtTime(d); }
          }
          video.addEventListener("loadedmetadata", sync);
          video.addEventListener("timeupdate", sync);
          video.addEventListener("play", function () { if (toggle) { toggle.innerHTML = ICON_PAUSE; } });
          video.addEventListener("pause", function () { if (toggle) { toggle.innerHTML = ICON_PLAY; } });

          if (track) {
            track.addEventListener("click", function (e) {
              var r = track.getBoundingClientRect();
              var d = video.duration || 0;
              if (d) { video.currentTime = Math.min(d, Math.max(0, (e.clientX - r.left) / r.width * d)); }
            });
          }
          sync();
        });
      }

        var html = '' +
          controls(t) +
          hero(t) +
          overview(t, stations) +

          finish(t) +
          footer(t);

        var app = document.getElementById("app");
        app.setAttribute("data-theme", state.theme);
        app.setAttribute("data-lang", state.lang);
        app.style.cssText = "background:var(--bg);width:100%;min-height:100vh;overflow:hidden;";
        app.innerHTML = html;
        document.documentElement.lang = state.lang === "zh" ? "zh" : "en";
        setupVideos();
      }

      var ACTIONS = {
        setEn: function () { state.lang = "en"; },
        setZh: function () { state.lang = "zh"; },
        setLight: function () { state.theme = "light"; },
        setDark: function () { state.theme = "dark"; },
      };

      document.getElementById("app").addEventListener("click", function (e) {
        var vbtn = e.target.closest("button[data-vidaction]");
        if (vbtn) {
          var block = vbtn.closest("[data-vidblock]");
          var video = block && block.querySelector("video");
          if (!video) return;
          var act = vbtn.getAttribute("data-vidaction");
          if (act === "back5") { video.currentTime = Math.max(0, video.currentTime - 5); }
          else if (act === "fwd5") { video.currentTime = Math.min(video.duration || 0, video.currentTime + 5); }
          else if (act === "playpause") { if (video.paused) { video.play(); } else { video.pause(); } }
          return;
        }
        var btn = e.target.closest("button[data-action]");
        if (!btn) return;
        var action = ACTIONS[btn.getAttribute("data-action")];
        if (action) { action(); render(); }
      });

      var toTop = document.getElementById("toTop");
      toTop.addEventListener("click", function () {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      function updateToTop() {
        var show = window.scrollY > 400;
        toTop.style.opacity = show ? "1" : "0";
        toTop.style.visibility = show ? "visible" : "hidden";
      }
      window.addEventListener("scroll", updateToTop, { passive: true });
      updateToTop();

      render();
    })();
  </script>
</body>

</html>
