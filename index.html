<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#fff;color:#000;font-family:'Inter','Noto Sans SC',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  :root{
    --bg:#ffffff;--surface:#f5f5f5;--card:#ffffff;
    --border:#e5e5e5;--border-strong:#000000;
    --text:#000000;--text-strong:#000000;--text-secondary:#666666;--text-muted:#999999;
    --accent:#F5D000;--on-accent:#000000;
    --ghost:#f0f0f0;--ph-bg:#f0f0f0;--ph-stripe:rgba(0,0,0,0.04);--ph-text:#999999;
    --switch-bg:rgba(255,255,255,0.92);--switch-border:#e5e5e5;
  }
  [data-theme="dark"]{
    --bg:#000000;--surface:#111111;--card:#0d0d0d;
    --border:#262626;--border-strong:#ffffff;
    --text:#ffffff;--text-strong:#ffffff;--text-secondary:#999999;--text-muted:#777777;
    --accent:#F5D000;--on-accent:#000000;
    --ghost:#161616;--ph-bg:#0f0f0f;--ph-stripe:rgba(255,255,255,0.05);--ph-text:#666666;
    --switch-bg:rgba(17,17,17,0.92);--switch-border:#262626;
  }
  ::selection{background:#F5D000;color:#000;}
  [data-lang="en"] [data-langbtn="en"],
  [data-lang="zh"] [data-langbtn="zh"],
  [data-theme="dark"] [data-themebtn="dark"],
  [data-theme="light"] [data-themebtn="light"]{background:var(--accent)!important;color:var(--on-accent)!important;}
  @media (max-width:860px){
    .station-grid{grid-template-columns:minmax(0,1fr)!important;}
    .station-left{position:static!important;}
  }
</style>
</head>

  function overview(t, stations){

        '<span style="display:flex;flex-direction:column;">'+

        '</span>'+
      '</a>';

    '<section style="border-bottom:1px solid var(--border);background:var(--surface);">'+
      '<div style="max-width:1280px;margin:0 auto;padding:88px 40px;">'+

      '<div style="max-width:1280px;margin:0 auto;padding:22px 40px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;">'+
        '<div style="display:flex;align-items:center;gap:18px;">'+
          '<span style="font-family:\'Anton\',sans-serif;font-size:clamp(14px,2vw,16px);letter-spacing:0.2em;color:#F5D000;">&rarr;</span>'+
          '<span style="font-family:\'Anton\',\'Noto Sans SC\',sans-serif;font-size:clamp(22px,3.4vw,34px);text-transform:uppercase;letter-spacing:0.03em;color:#ffffff;">'+esc(t.runLabel)+'</span>'+
          '<span style="flex:1;height:1px;min-width:30px;background:repeating-linear-gradient(90deg,#2c2c2c 0 12px,transparent 12px 22px);display:inline-block;"></span>'+
        '</div>'+
        '<span style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#888888;">'+esc(t.intoStation)+' '+esc(num)+'</span>'+
      '</div>'+
    '</div>';
  }

  function listItems(items, markerHtml){
    return items.map(function(it){
      return ''+
      '<li style="display:flex;gap:15px;align-items:flex-start;">'+
        markerHtml(it)+
        '<span style="font-size:16px;line-height:1.5;color:var(--text);">'+esc(it.text !== undefined ? it.text : it)+'</span>'+
      '</li>';
    }).join('');
  }

  function station(t, s){
    var loadCells = '';
    if(s.hasLoad){
      loadCells = ''+
      '<div style="flex:1;padding:18px 22px;border-left:1px solid var(--border);">'+
        '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">'+esc(t.lblMen)+'</div>'+
        '<div style="font-family:\'Anton\',sans-serif;font-size:clamp(26px,3vw,34px);line-height:1;color:var(--text-strong);">'+esc(s.load.men)+'</div>'+
      '</div>'+
      '<div style="flex:1;padding:18px 22px;border-left:1px solid var(--border);">'+
        '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">'+esc(t.lblWomen)+'</div>'+
        '<div style="font-family:\'Anton\',sans-serif;font-size:clamp(26px,3vw,34px);line-height:1;color:var(--text-strong);">'+esc(s.load.women)+'</div>'+
      '</div>';
    }

    var rules = s.rules.map(function(text, i){ return { n: String(i+1), text: text }; });

    var rulesHtml = listItems(rules, function(r){
      return '<span style="font-family:\'Anton\',sans-serif;font-size:15px;color:var(--text-muted);margin-top:1px;flex-shrink:0;min-width:14px;">'+esc(r.n)+'</span>';
    });
    var penaltyHtml = listItems(s.penalty, function(){
      return '<span style="width:8px;height:8px;border:2px solid var(--accent);margin-top:6px;flex-shrink:0;"></span>';
    });
    var tipsHtml = listItems(s.tips, function(){
      return '<span style="width:9px;height:9px;background:var(--accent);margin-top:7px;flex-shrink:0;"></span>';
    });

    return ''+
    '<section id="station-'+esc(s.num)+'" style="position:relative;border-bottom:1px solid var(--border);overflow:hidden;background:var(--bg);">'+
      '<div style="position:absolute;top:-6%;right:-1%;font-family:\'Anton\',sans-serif;font-size:clamp(190px,34vw,470px);line-height:0.8;color:var(--ghost);pointer-events:none;user-select:none;z-index:0;">'+esc(s.num)+'</div>'+
      '<div class="station-grid" style="position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:76px 40px 84px;display:grid;grid-template-columns:minmax(0,0.84fr) minmax(0,1.16fr);gap:56px;align-items:start;">'+

        '<div class="station-left" style="position:sticky;top:24px;">'+
          '<div style="aspect-ratio:4/5;width:100%;border:1px solid var(--border);background-color:var(--ph-bg);background-image:repeating-linear-gradient(135deg,var(--ph-stripe) 0 11px,transparent 11px 22px);display:flex;align-items:center;justify-content:center;">'+
            '<span style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:600;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ph-text);text-align:center;padding:0 22px;">'+esc(s.ph)+'</span>'+
          '</div>'+
          '<div style="display:flex;border:1px solid var(--border);border-top:none;background:var(--card);">'+
            '<div style="flex:1;padding:18px 22px;">'+
              '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;">'+esc(s.specLabel)+'</div>'+
              '<div style="font-family:\'Anton\',sans-serif;font-size:clamp(26px,3vw,34px);line-height:1;color:var(--text-strong);">'+esc(s.spec)+'</div>'+
            '</div>'+
            loadCells+
          '</div>'+
        '</div>'+

        '<div>'+
          '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:14px;">'+esc(t.station)+' '+esc(s.num)+' &mdash; '+esc(s.cat)+'</div>'+
          '<h3 style="font-family:\'Anton\',\'Noto Sans SC\',sans-serif;font-weight:400;font-size:clamp(44px,7vw,88px);line-height:0.9;text-transform:uppercase;letter-spacing:-0.005em;margin:0 0 38px;color:var(--text-strong);">'+esc(s.name)+'</h3>'+

          '<div style="margin-bottom:38px;">'+
            '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-strong);border-bottom:2px solid var(--border-strong);padding-bottom:11px;margin-bottom:20px;">'+esc(t.lblRules)+'</div>'+
            '<ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:15px;">'+rulesHtml+'</ul>'+
          '</div>'+

          '<div style="margin-bottom:38px;">'+
            '<div style="display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--border-strong);padding-bottom:11px;margin-bottom:20px;">'+
              '<span style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-strong);">'+esc(t.lblPenalty)+'</span>'+
              '<span style="font-family:\'Inter\',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#000;background:var(--accent);padding:3px 8px;">'+esc(t.penaltyTag)+'</span>'+
            '</div>'+
            '<ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:15px;">'+penaltyHtml+'</ul>'+
          '</div>'+

          '<div>'+
            '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-strong);border-bottom:2px solid var(--border-strong);padding-bottom:11px;margin-bottom:20px;">'+esc(t.lblTips)+'</div>'+
            '<ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:15px;">'+tipsHtml+'</ul>'+
          '</div>'+

        '</div>'+
      '</div>'+
    '</section>';
  }

  function finish(t){
    return ''+
    '<section style="background:#F5D000;color:#000;">'+
      '<div style="max-width:1280px;margin:0 auto;padding:96px 40px;text-align:center;">'+
        '<div style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.24em;text-transform:uppercase;color:#000;opacity:0.65;margin-bottom:22px;">'+esc(t.finishKicker)+'</div>'+
        '<h2 style="font-family:\'Anton\',\'Noto Sans SC\',sans-serif;font-weight:400;font-size:clamp(58px,12vw,160px);line-height:0.84;text-transform:uppercase;margin:0;color:#000;">'+esc(t.finishTitle)+'</h2>'+
        '<p style="max-width:540px;margin:28px auto 0;font-size:18px;line-height:1.55;color:#1a1a1a;font-weight:500;">'+esc(t.finishSub)+'</p>'+
      '</div>'+
    '</section>';
  }

  function footer(t){
    return ''+
    '<footer style="background:var(--surface);border-top:1px solid var(--border);">'+
      '<div style="max-width:1280px;margin:0 auto;padding:32px 40px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;">'+
        '<span style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);">'+esc(t.footL)+'</span>'+
        '<span style="font-family:\'Inter\',\'Noto Sans SC\',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);">'+esc(t.footR)+'</span>'+
      '</div>'+
    '</footer>';
  }

  function render(){
    var t = COPY[state.lang];
    var stations = RAW[state.lang];

    var stationsHtml = stations.map(function(s){
      return runDivider(t, s.num) + station(t, s);
    }).join('');

    var html = ''+
      controls(t)+
      hero(t)+
      overview(t, stations)+
      stationsHtml+
      finish(t)+
      footer(t);

    var app = document.getElementById("app");
    app.setAttribute("data-theme", state.theme);
    app.setAttribute("data-lang", state.lang);
    app.style.cssText = "background:var(--bg);width:100%;min-height:100vh;overflow:hidden;";
    app.innerHTML = html;
    document.documentElement.lang = state.lang === "zh" ? "zh" : "en";
  }

  var ACTIONS = {
    setEn:    function(){ state.lang = "en"; },
    setZh:    function(){ state.lang = "zh"; },
    setLight: function(){ state.theme = "light"; },
    setDark:  function(){ state.theme = "dark"; },
  };

  document.getElementById("app").addEventListener("click", function(e){
    var btn = e.target.closest("button[data-action]");
    if(!btn) return;
    var action = ACTIONS[btn.getAttribute("data-action")];
    if(action){ action(); render(); }
  });

  render();
})();
</script>
</body>
</html>
